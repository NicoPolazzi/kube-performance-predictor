pipeline:
  sequence_length: 1
  train_ratio: 0.9
  split_strategy: extrapolation

model:
  hidden_size: 256
  hidden_size_2: 256
  head_hidden_size: 128

training:
  epochs: 100
  learning_rate: 0.003
  batch_size: 32
  weight_decay: 0.00001

scheduler:
  factor: 0.5
  patience: 40
  min_lr: 0.000001
